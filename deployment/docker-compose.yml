version: '3.8'

services:
  opencloudtouch:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: opencloudtouch
    network_mode: host
    volumes:
      - oct-data:/data
      - oct-logs:/logs
    environment:
      - OCT_HOST=0.0.0.0
      - OCT_PORT=7777
      - OCT_DB_PATH=/data/oct.db
      - OCT_LOG_LEVEL=INFO
      - OCT_LOG_DIR=/logs
      - OCT_MOCK_MODE=false  # Production: Use real devices
      - OCT_DISCOVERY_ENABLED=true
      - OCT_DISCOVERY_TIMEOUT=3
      # Station descriptor URL - auto-detects host IP if set to localhost
      # For manual override, set to your server's IP: http://192.168.1.50:7777
      - OCT_STATION_DESCRIPTOR_BASE_URL=http://localhost:7777
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/entrypoint.sh", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  oct-data:
    driver: local
  oct-logs:
    driver: local

# OpenCloudTouch Docker Compose — Raspberry Pi Appliance
# This file is auto-generated by the RPi image builder.
# Manual changes will be overwritten on update.

services:
  opencloudtouch:
    image: ghcr.io/scheilch/opencloudtouch:latest
    container_name: opencloudtouch
    network_mode: host
    volumes:
      - /opt/opencloudtouch/data:/data
    environment:
      - OCT_HOST=0.0.0.0
      - OCT_PORT=7777
      - OCT_DB_PATH=/data/oct.db
      - OCT_LOG_LEVEL=INFO
      - OCT_MOCK_MODE=false
      - OCT_DISCOVERY_ENABLED=true
      - OCT_DISCOVERY_TIMEOUT=5
      - OCT_STATION_DESCRIPTOR_BASE_URL=http://localhost:7777
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7777/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

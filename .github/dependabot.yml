# Dependabot configuration for automated dependency updates
# Version updates: quarterly | Security updates: immediately (GitHub-triggered)

version: 2
updates:
  # Backend Python dependencies
  - package-ecosystem: "pip"
    directory: "/apps/backend"
    schedule:
      interval: "quarterly"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "backend"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    reviewers:
      - "user"
    assignees:
      - "user"
    groups:
      # minor+patch: 1 PR per quarter
      python-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # security: immediate, bundled
      python-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Frontend npm dependencies
  - package-ecosystem: "npm"
    directory: "/apps/frontend"
    schedule:
      interval: "quarterly"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
      - "frontend"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    reviewers:
      - "user"
    assignees:
      - "user"
    # Ignore major versions for stable dependencies
    ignore:
      # React stays at current major for stability
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
    groups:
      # minor+patch: 1 PR per quarter
      npm-minor-patch:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      # security: immediate, bundled
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"

  # Root-level npm dependencies (workspace management)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "quarterly"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "npm"
      - "workspace"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "quarterly"
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
      - "ci"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

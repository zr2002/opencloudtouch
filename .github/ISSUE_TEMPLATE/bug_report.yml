name: "\U0001FAA4 Bug Report"
description: "Report a bug or unexpected behaviour in OpenCloudTouch."
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: |
        A clear and concise description of the bug.
        - What did you expect to happen?
        - What actually happened instead?
      placeholder: |
        Example: "I searched for radio stations in Luxembourg, but the list only
        showed stations starting with 'A'. I expected to see popular stations
        like RTL Radio Lëtzebuerg."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: |
        Exact steps to reproduce the behaviour. Be as specific as possible.
      placeholder: |
        1. Open the app in the browser
        2. Navigate to "Radio" → "Search"
        3. Select country "Luxembourg"
        4. Observe the results list
      render: markdown
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behaviour
      description: "What should happen instead?"
      placeholder: "The search results should include popular stations like RTL Radio Lëtzebuerg."
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected Area
      description: "Which part of OpenCloudTouch is affected? This helps us route your issue to the right team and select the appropriate troubleshooting guide."
      options:
        - Radio Search
        - Presets
        - Device Control
        - Zones / Multi-Room
        - "Setup: SSH / USB Stick"
        - "Setup: Config Modification"
        - "Setup: Hosts Modification"
        - "Setup: Backup / Restore"
        - UI / Design
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: OpenCloudTouch Version
      description: "Which version are you running? Open **Settings** in the Web UI, or run `curl http://<your-host>:<port>/health` (default port is 7777) — the `version` field in the response."
      placeholder: "e.g. 0.2.0"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Type
      description: "How is OpenCloudTouch installed?"
      options:
        - Raspberry Pi (official image)
        - Docker / Podman (self-hosted)
        - Local development
        - Other
    validations:
      required: true

  - type: dropdown
    id: custom-build
    attributes:
      label: Did you build the image yourself?
      description: "Did you build the Docker image from source (`docker build`) or did you pull the official image (`docker pull ghcr.io/opencloudtouch/opencloudtouch:stable`)? **We only support the official pre-built image.**"
      options:
        - "No — I pulled the official image (ghcr.io/opencloudtouch/opencloudtouch)"
        - "Yes — I built it myself from source"
    validations:
      required: true

  - type: textarea
    id: version-screenshot
    attributes:
      label: Version Screenshot
      description: |
        Please provide a screenshot of the **Settings** page in the Web UI showing the version number.
        Alternatively, paste the output of: `curl http://<your-host>:<port>/health` (default port: 7777)
      placeholder: "Drag & drop a screenshot here, or paste the /health output."
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser & Device
      description: "Which browser and device are you using?"
      placeholder: "e.g. Chrome 125 on Windows 11, Safari on iPhone 15"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: "If applicable, add screenshots or screen recordings to help explain the problem."
      placeholder: "Drag & drop images here or paste from clipboard."
    validations:
      required: false

  - type: textarea
    id: backend-logs
    attributes:
      label: Backend Logs
      description: |
        Backend logs help us diagnose server-side issues. Here's how to get them:

        **Raspberry Pi (official image):**
        ```bash
        ssh pi@opencloudtouch.local
        docker logs opencloudtouch --tail 500
        ```

        **Docker / Podman (self-hosted):**
        ```bash
        docker logs opencloudtouch --tail 500
        # or
        podman logs opencloudtouch-local --tail 500
        ```

        **Even easier — use the built-in Bug Report button!**
        Go to **Settings → Report a Bug** in the Web UI. This automatically attaches the last 500 backend log lines, device status, DB stats, and frontend console logs to the GitHub issue. No SSH or copy-paste needed.

        **Tip:** For more detail, set `OCT_LOG_LEVEL=DEBUG` in your `docker-compose.yml` environment, restart the container, reproduce the bug, then grab the logs.
      placeholder: "Paste the relevant log output here."
      render: shell
    validations:
      required: false

  - type: textarea
    id: frontend-logs
    attributes:
      label: Frontend Logs (Browser Console)
      description: |
        Frontend logs help us diagnose UI issues. Here's how to get them:

        1. Open the app in your browser
        2. Press **F12** (or right-click → "Inspect") to open Developer Tools
        3. Go to the **Console** tab
        4. Reproduce the bug
        5. Copy any red error messages or warnings

        **Tip:** In the **Network** tab, you can also check for failed API requests (shown in red). Right-click → "Copy as cURL" is very helpful for us.
      placeholder: "Paste the relevant console output here."
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: |
        Anything else that might help:
        - Does it happen every time or only sometimes?
        - Did it work before? If so, since which version does it fail?
        - Number of SoundTouch devices, network setup, etc.
      placeholder: "Any other details."
    validations:
      required: false

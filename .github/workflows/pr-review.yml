# ==============================================================================
# AI PR REVIEW â€” oct-support bot
#
# Phase 1 (review): Triggered when oct-support is requested as reviewer.
#   â†’ AI analyzes the diff and submits a qualified review with inline comments.
#
# Phase 2 (approve): Triggered on new pushes to reviewed PRs.
#   â†’ Checks if all oct-support review threads are resolved.
#   â†’ If yes, auto-approves the PR.
# ==============================================================================

name: PR Review (oct-support)

on:
  pull_request_target:
    types: [opened, review_requested, synchronize]

permissions:
  contents: read
  pull-requests: read
  models: read

jobs:
  # ============================================================================
  # COMMUNITY PR WELCOME & FEEDBACK
  # ============================================================================
  welcome:
    name: Welcome & Guide
    runs-on: ubuntu-latest
    # Only for external contributors (fork PRs) when PR is opened
    if: >-
      github.event_name == 'pull_request_target'
      && github.event.action == 'opened'
      && github.event.pull_request.head.repo.full_name != github.repository
    permissions:
      pull-requests: write

    steps:
      - name: Welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            // Check if this is the contributor's first PR
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              sort: 'created',
              direction: 'asc',
              per_page: 5,
            });
            const prsByAuthor = prs.filter(p => p.user.login === author);
            const isFirstPR = prsByAuthor.length <= 1;

            let body = '';
            if (isFirstPR) {
              body += `### đź‘‹ Welcome @${author}!\n\n`;
              body += `Thanks for your first contribution to OpenCloudTouch! We're glad to have you.\n\n`;
            } else {
              body += `### đź‘‹ Hey @${author}, welcome back!\n\n`;
              body += `Thanks for another contribution!\n\n`;
            }

            body += `#### âŹł CI Pipeline\n\n`;
            body += `Our CI runs automatically once a maintainer approves the workflow. `;
            body += `This is a GitHub security requirement for first-time contributors. `;
            body += `We'll approve it shortly.\n\n`;
            body += `In the meantime, you can run the checks locally:\n\n`;
            body += `\`\`\`bash\n`;
            body += `# Backend\n`;
            body += `cd apps/backend && pip install -r requirements-dev.txt\n`;
            body += `pytest tests/unit -x -q\n`;
            body += `ruff check src/\n\n`;
            body += `# Frontend\n`;
            body += `cd apps/frontend && npm ci\n`;
            body += `npm test\n`;
            body += `npx eslint src/\n`;
            body += `\`\`\`\n\n`;
            body += `#### âś… PR Checklist\n\n`;
            body += `- [ ] Commit messages follow [Conventional Commits](https://www.conventionalcommits.org/) format\n`;
            body += `- [ ] Tests added/updated for changed code\n`;
            body += `- [ ] Code formatted (Python: \`black\`, TypeScript: \`prettier\`)\n\n`;
            body += `đź“– See [CONTRIBUTING.md](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/.github/CONTRIBUTING.md) for details.\n`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: body,
            });

  # ============================================================================
  # PHASE 1: AI REVIEW â€” when oct-support is requested as reviewer
  # ============================================================================
  review:
    name: PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: >-
      github.event_name == 'pull_request_target'
      && github.event.requested_reviewer.login == 'oct-support'

    steps:
      - name: "Checkout base branch (security: never run PR code)"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r scripts/pr_reviewer/requirements.txt

      - name: Restore cost tracker cache
        uses: actions/cache/restore@v5
        with:
          path: /tmp/ai-cost-tracker
          key: pr-review-cost-${{ github.run_id }}
          restore-keys: |
            pr-review-cost-

      - name: Run AI review
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MODE: review
        run: python scripts/pr_reviewer/main.py

      - name: Save cost tracker cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: /tmp/ai-cost-tracker
          key: pr-review-cost-${{ github.run_id }}

  # ============================================================================
  # PHASE 2: AUTO-APPROVE â€” when new commits are pushed to a reviewed PR
  # Uses pull_request_target to always run code from base branch (main),
  # preventing malicious PR code from manipulating the approve logic.
  # ============================================================================
  approve-check:
    name: Approve Check
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: >-
      github.event_name == 'pull_request_target'
      && github.event.action == 'synchronize'

    steps:
      - name: "Checkout base branch (security: never run PR code)"
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r scripts/pr_reviewer/requirements.txt

      - name: Check and approve
        env:
          BOT_PAT: ${{ secrets.BOT_PAT }}
          REPO_FULL_NAME: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MODE: approve
        run: python scripts/pr_reviewer/main.py



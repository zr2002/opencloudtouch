# ==============================================================================
# RELEASE WORKFLOW - Tag + GitHub Release pipeline
#
# Trigger: workflow_dispatch with release_type choice (patch/minor/major)
# Steps:
#   1. Pre-flight: Calculate next version, check tag availability, enforce CI green
#   2. Bump:       Update all package files + commit + push
#   3. Tag:        vX.Y.Z annotated tag on the bump commit
#   4. GH Release: Auto-generated changelog + Docker instructions (DRAFT)
#   5. Build:      Run build-images.yml (Docker multi-arch + Raspi SD images)
#   6. Publish:    Publish release (draft → public) only after successful build
# ==============================================================================

name: Release
run-name: "Release · v${{ inputs.release_type == 'patch' && vars.NEXT_PATCH || inputs.release_type == 'minor' && vars.NEXT_MINOR || vars.NEXT_MAJOR }} · ${{ github.ref_name }}"

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Mark as pre-release (beta/rc)'
        required: false
        type: boolean
        default: false
      mark_as_stable:
        description: 'Tag Docker image as "stable"'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Least-privilege: no default permissions. Jobs declare what they need.
permissions: {}

jobs:
  # ============================================================================
  # PRE-FLIGHT CHECKS
  # ============================================================================
  preflight:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    outputs:
      version: ${{ steps.calc.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: calc
        run: |
          RELEASE_TYPE="${{ inputs.release_type }}"

          CURRENT=$(grep '"version"' package.json | head -1 | grep -o '[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*')
          echo "Current version: $CURRENT"

          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          case "$RELEASE_TYPE" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check tag does not exist
        run: |
          TAG="v${{ steps.calc.outputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists! Delete first: git push --delete origin $TAG && git tag -d $TAG"
            exit 1
          fi
          echo "Tag $TAG is available"

      - name: Check CI passed on branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Checking CI/CD status on branch $BRANCH..."

          LAST_RUN=$(gh run list --workflow=ci-cd.yml --branch="$BRANCH" --limit=1 \
            --json conclusion,status --jq '.[0]' 2>/dev/null || echo "{}")

          CONCLUSION=$(echo "$LAST_RUN" | jq -r '.conclusion // "none"')
          STATUS=$(echo "$LAST_RUN" | jq -r '.status // "none"')

          echo "Last CI run: conclusion=$CONCLUSION status=$STATUS"

          if [ "$STATUS" = "in_progress" ] || [ "$STATUS" = "queued" ] || [ "$STATUS" = "waiting" ]; then
            echo "::error::CI is still running on $BRANCH. Wait for it to complete before releasing."
            exit 1
          fi

          if [ "$CONCLUSION" = "failure" ] || [ "$CONCLUSION" = "cancelled" ]; then
            echo "::error::Last CI run on $BRANCH failed (conclusion=$CONCLUSION). Fix CI before releasing."
            exit 1
          fi

          if [ "$CONCLUSION" = "none" ] || [ "$STATUS" = "none" ]; then
            echo "::error::No CI run found on $BRANCH. Push changes and wait for CI to pass before releasing."
            exit 1
          fi

          echo "CI passed on $BRANCH (conclusion=$CONCLUSION)"

  # ============================================================================
  # VERSION BUMP + COMMIT + PUSH
  # ============================================================================
  bump:
    name: Bump Version
    runs-on: ubuntu-latest
    needs: preflight

    permissions:
      contents: write

    outputs:
      sha: ${{ steps.commit.outputs.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in all package files
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          echo "Bumping all package files to $VERSION..."

          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" package.json
          echo "  package.json"

          sed -i "0,/\"version\": \"[^\"]*\"/s//\"version\": \"$VERSION\"/" package-lock.json
          sed -i "0,/\"version\": \"[^\"]*\"/s//\"version\": \"$VERSION\"/" package-lock.json
          echo "  package-lock.json"

          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" apps/frontend/package.json
          echo "  apps/frontend/package.json"

          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" apps/backend/pyproject.toml
          echo "  apps/backend/pyproject.toml"

          sed -i "s/^  version: .*/  version: $VERSION/" apps/backend/openapi.yaml
          echo "  apps/backend/openapi.yaml"

          sed -i "s/^sonar.projectVersion=.*/sonar.projectVersion=$VERSION/" sonar-project.properties
          echo "  sonar-project.properties"

          echo ""
          echo "Verification:"
          grep '"version"' package.json | head -1
          grep '"version"' apps/frontend/package.json | head -1
          grep '^version' apps/backend/pyproject.toml | head -1
          grep '^  version:' apps/backend/openapi.yaml | head -1
          grep '^sonar.projectVersion' sonar-project.properties

      - name: Commit and push version bump
        id: commit
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          git add package.json package-lock.json apps/frontend/package.json apps/backend/pyproject.toml apps/backend/openapi.yaml sonar-project.properties
          if git diff --cached --quiet; then
            echo "Nothing to commit (versions already at $VERSION)"
          else
            git commit -m "chore: bump version to $VERSION"
            git push origin HEAD:${{ github.ref_name }}
            echo "Version bump committed and pushed"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  # ============================================================================
  # GIT TAG on the bump commit
  # ============================================================================
  tag:
    name: Create Git Tag
    runs-on: ubuntu-latest
    needs: [preflight, bump]

    permissions:
      contents: write

    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}

    steps:
      - name: Checkout bump commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.bump.outputs.sha }}
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        id: tag
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          TAG="v${VERSION}"

          git tag -a "$TAG" -m "Release $TAG

          OpenCloudTouch $TAG - Local control for Bose SoundTouch devices.

          See CHANGELOG.md for details."

          git push origin "$TAG"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Tag $TAG created on commit $(git rev-parse HEAD)"

  # ============================================================================
  # GITHUB RELEASE (notes + publish)
  # ============================================================================
  gh-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [preflight, tag]

    permissions:
      contents: write

    outputs:
      version: ${{ needs.preflight.outputs.version }}

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.tag.outputs.tag }}

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          TAG="v${VERSION}"

          PREV_TAG=$(git tag --sort=-v:refname | grep -v "$TAG" | head -1 || echo "")

          if [ -z "$PREV_TAG" ]; then
            RANGE=""
            COMPARE_TEXT="First release of OpenCloudTouch!"
          else
            RANGE="${PREV_TAG}..${TAG}"
            COMPARE_TEXT="**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
          fi

          cat > release-notes.md << 'NOTES_EOF'
          ## OpenCloudTouch VERSION_PLACEHOLDER

          Local control for Bose SoundTouch devices - after the cloud shutdown.
          NOTES_EOF
          sed -i "s/VERSION_PLACEHOLDER/v${VERSION}/" release-notes.md
          sed -i 's/^          //' release-notes.md

          add_section() {
            local title="$1" pattern="$2" content=""
            if [ -n "$RANGE" ]; then
              content=$(git log $RANGE --pretty=format:"- %s (%h)" --no-merges --grep="$pattern" 2>/dev/null || true)
            else
              content=$(git log --pretty=format:"- %s (%h)" --no-merges --grep="$pattern" 2>/dev/null || true)
            fi
            if [ -n "$content" ]; then
              printf "\n### %s\n\n%s\n" "$title" "$content" >> release-notes.md
            fi
          }

          add_section "Features"       "^feat"
          add_section "Bug Fixes"      "^fix"
          add_section "Performance"    "^perf"
          add_section "Refactoring"    "^refactor"
          add_section "Tests"          "^test"
          add_section "Documentation"  "^docs"
          add_section "CI/CD"          "^ci"
          add_section "Maintenance"    "^chore|^build"
          add_section "Style"          "^style"

          cat >> release-notes.md << DOCKER_EOF

          ---

          ## Installation

          ### Docker (recommended)

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}:${VERSION}

          docker run -d \\
            --name opencloudtouch \\
            --network host \\
            -v opencloudtouch-data:/data \\
            -e OCT_DISCOVERY_ENABLED=true \\
            ghcr.io/${{ github.repository }}:${VERSION}
          \`\`\`

          ### Docker Compose

          \`\`\`yaml
          services:
            opencloudtouch:
              image: ghcr.io/${{ github.repository }}:${VERSION}
              container_name: opencloudtouch
              restart: unless-stopped
              network_mode: host
              volumes:
                - oct-data:/data
              environment:
                - OCT_DISCOVERY_ENABLED=true
                - OCT_LOG_LEVEL=INFO
          volumes:
            oct-data:
          \`\`\`

          ### Available Docker Tags

          | Tag | Description |
          |-----|-------------|
          | \`${VERSION}\` | This specific version |
          | \`latest\` | Latest build from main branch |

          ### Supported Architectures

          | Architecture | Platform | Example Devices |
          |-------------|----------|-----------------|
          | \`amd64\` | x86_64 | Desktop, Server, NAS |
          | \`arm64\` | aarch64 | Raspberry Pi 4/5 |
          | \`arm/v7\` | armhf | Raspberry Pi 2/3 |

          ---

          ### 🍓 Raspberry Pi

          SD card images are released independently. Flash the latest image and it will
          automatically pull this version on first boot.

          👉 **[Download Raspberry Pi SD Card Images](https://github.com/${{ github.repository }}/releases?q=raspi&expanded=true)**

          ---

          ${COMPARE_TEXT}
          DOCKER_EOF

          # Add stable tag row if this release is marked as stable
          if [ "${{ inputs.mark_as_stable }}" = "true" ] && [ "${{ inputs.prerelease }}" != "true" ]; then
            sed -i "/| \`latest\`/i\\          | \`stable\` | Latest stable release (recommended) |" release-notes.md
          fi

          echo "=== Release Notes Preview ==="
          head -30 release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          name: "OpenCloudTouch v${{ needs.preflight.outputs.version }}"
          body_path: release-notes.md
          prerelease: ${{ inputs.prerelease }}
          draft: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Step summary
        run: |
          VERSION="${{ needs.preflight.outputs.version }}"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # Release v${VERSION} Created!

          | Step | Status |
          |------|--------|
          | Version bump | OK - v${VERSION} committed |
          | Git tag | OK - v${VERSION} pushed |
          | GitHub Release | OK - Draft created (published after image build) |

          **Release**: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}
          EOF

  # ============================================================================
  # BUILD DOCKER + RASPBERRY PI IMAGES (via reusable workflow)
  # ============================================================================
  build-images:
    name: Build Docker Images
    needs: [gh-release, tag]
    permissions:
      packages: write
      contents: write
      security-events: write
    uses: ./.github/workflows/build-images.yml
    with:
      version: ${{ needs.gh-release.outputs.version }}
      checkout_ref: ${{ needs.tag.outputs.tag }}
      mark_as_stable: ${{ inputs.mark_as_stable && !inputs.prerelease }}
    secrets:
      BUILD_SIGNING_KEY: ${{ secrets.BUILD_SIGNING_KEY }}
      SUPPORTERS_API_PASS: ${{ secrets.SUPPORTERS_API_PASS }}

  # ============================================================================
  # PUBLISH RELEASE (draft → public, only after successful image build)
  # ============================================================================
  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [gh-release, build-images]
    if: always() && needs.gh-release.result == 'success' && needs.build-images.result == 'success'

    permissions:
      contents: write

    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.gh-release.outputs.version }}"
          TAG="v${VERSION}"
          echo "Image build succeeded — publishing release ${TAG}..."

          # NOTE: /releases/tags/{tag} does NOT return draft releases (GitHub API limitation).
          # Use /releases endpoint and filter by tag_name instead.
          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases" \
            --jq ".[] | select(.tag_name==\"${TAG}\") | .id")

          if [ -z "$RELEASE_ID" ]; then
            echo "::error::No release found for tag ${TAG}"
            exit 1
          fi

          gh api "repos/${{ github.repository }}/releases/${RELEASE_ID}" \
            --method PATCH \
            --field draft=false \
            --field make_latest=${{ !inputs.prerelease }}

          echo "Release ${TAG} published (release_id=${RELEASE_ID})"

      - name: Step summary
        run: |
          VERSION="${{ needs.gh-release.outputs.version }}"
          cat >> $GITHUB_STEP_SUMMARY << EOF
          # Release v${VERSION} Published!

          | Step | Status |
          |------|--------|
          | Draft release | Created |
          | Docker images | Built + pushed |
          | Release published | **Live** |

          **Release**: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}
          EOF

      - name: Update next-version variables
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION="${{ needs.gh-release.outputs.version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          gh variable set NEXT_PATCH --body "${MAJOR}.${MINOR}.$((PATCH + 1))" --repo ${{ github.repository }}
          gh variable set NEXT_MINOR --body "${MAJOR}.$((MINOR + 1)).0" --repo ${{ github.repository }}
          gh variable set NEXT_MAJOR --body "$((MAJOR + 1)).0.0" --repo ${{ github.repository }}

          echo "Updated version variables:"
          echo "  NEXT_PATCH = ${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "  NEXT_MINOR = ${MAJOR}.$((MINOR + 1)).0"
          echo "  NEXT_MAJOR = $((MAJOR + 1)).0.0"

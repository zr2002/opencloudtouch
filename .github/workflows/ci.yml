# ==============================================================================
# CI PIPELINE - Build, Test, Lint, Security, SonarCloud
#
# Runs on every push (all branches) and every PR.
# Does NOT build Docker images or push artefacts.
# ==============================================================================

name: CI

on:
  push:
    branches:
      - main

  pull_request:
    types: [opened, synchronize, reopened]

  workflow_dispatch:

jobs:
  # ============================================================================
  # SECURITY SCANNING
  # ============================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install security tools
        run: pip install bandit safety

      - name: Run bandit (Python security)
        run: bandit -r apps/backend/src --severity-level medium

      - name: Run safety (Python vulnerabilities)
        run: safety check --file apps/backend/requirements.txt
        continue-on-error: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Run npm audit (Frontend vulnerabilities)
        working-directory: apps/frontend
        run: npm audit --production --audit-level=high
        continue-on-error: true

  # ============================================================================
  # CODE FORMATTING
  # ============================================================================
  format:
    name: Check Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install black
        run: pip install black==26.1.0

      - name: Check Python formatting
        run: black --check apps/backend/

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Check TypeScript/React formatting
        working-directory: apps/frontend
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,json,css}"

  # ============================================================================
  # LINTING
  # ============================================================================
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    needs: [security, format]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Run ruff (Python linter)
        run: ruff check apps/backend/ --select=E,F,W --ignore=E501

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefer-offline

      - name: Run ESLint
        working-directory: apps/frontend
        run: npm run lint

  # ============================================================================
  # BACKEND TESTS
  # ============================================================================
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [security, format]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/backend/requirements-dev.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e apps/backend
          pip install -r apps/backend/requirements-dev.txt

      - name: Run tests with coverage
        run: |
          cd apps/backend
          pytest --cov=opencloudtouch --cov-report=xml --cov-report=json --cov-report=term-missing --cov-fail-under=80
        env:
          OCT_MOCK_MODE: "true"
          OCT_HAS_DEVICES: "false"
          CI: "true"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./.out/coverage/backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage JSON (for summary)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: |
            .out/coverage/backend/coverage.json
            .out/coverage/backend/coverage.xml
          retention-days: 1

  # ============================================================================
  # FRONTEND TESTS
  # ============================================================================
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [security, format]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-x64-gnu --save-optional

      - name: Run unit tests with coverage
        working-directory: apps/frontend
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./.out/coverage/frontend/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage JSON (for summary)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: frontend-coverage
          path: |
            .out/coverage/frontend/coverage-summary.json
            .out/coverage/frontend/lcov.info
          retention-days: 1

  # ============================================================================
  # E2E TESTS (Mock backend - no real devices)
  # ============================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [security, format]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache Python dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('apps/backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: pip install -e apps/backend

      - name: Install frontend dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-x64-gnu --save-optional

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Start mock backend
        run: |
          cd apps/backend
          OCT_MOCK_MODE=true OCT_LOG_LEVEL=WARNING OCT_ALLOW_DANGEROUS_OPERATIONS=true \
            python -m uvicorn opencloudtouch.main:app --host 0.0.0.0 --port 7778 &
          sleep 10
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:7778/health

      - name: Start frontend preview server
        run: |
          cd apps/frontend
          npm run preview -- --port 4173 --strictPort &
          sleep 5
          curl --retry 10 --retry-delay 2 --retry-connrefused http://localhost:4173

      - name: Run Cypress E2E tests
        id: cypress
        working-directory: apps/frontend
        run: npm run test:e2e
        env:
          CYPRESS_BASE_URL: http://localhost:4173
          CYPRESS_API_URL: http://localhost:7778/api

      - name: Upload Cypress screenshots on failure
        uses: actions/upload-artifact@v7
        if: failure() && steps.cypress.outcome == 'failure'
        with:
          name: cypress-screenshots
          path: apps/frontend/tests/e2e/screenshots
          retention-days: 7

  # ============================================================================
  # SONARCLOUD ANALYSIS
  # ============================================================================
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: backend-coverage
          path: .out/coverage/backend

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: frontend-coverage
          path: .out/coverage/frontend

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >
            -Dsonar.projectKey=scheilch_opencloudtouch
            -Dsonar.organization=scheilscm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ============================================================================
  # SUMMARY
  # ============================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [security, format, lint, backend-tests, frontend-tests, e2e-tests]
    if: always()

    steps:
      - name: Download backend coverage
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: backend-coverage
          path: ./coverage

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: frontend-coverage
          path: ./coverage

      - name: Generate summary
        run: |
          echo "# CI Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Format Check  | ${{ needs.format.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint          | ${{ needs.lint.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.backend-tests.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests| ${{ needs.frontend-tests.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E Tests     | ${{ needs.e2e-tests.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY

          if [ -f ./coverage/coverage.json ]; then
            BACKEND_COV=$(python3 -c "import json; data=json.load(open('./coverage/coverage.json')); print(f\"{data['totals']['percent_covered']:.1f}%\")" 2>/dev/null || echo "N/A")
            echo "**Backend Coverage:** $BACKEND_COV" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f ./coverage/coverage-summary.json ]; then
            FRONTEND_COV=$(python3 -c "import json; data=json.load(open('./coverage/coverage-summary.json')); total=data.get('total',{}); lines=total.get('lines',{}); print(f\"{lines.get('pct',0):.1f}%\")" 2>/dev/null || echo "N/A")
            echo "**Frontend Coverage:** $FRONTEND_COV" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if any job failed
        run: |
          if [[ "${{ needs.security.result }}" != "success" ]] || \
             [[ "${{ needs.format.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.backend-tests.result }}" != "success" ]] || \
             [[ "${{ needs.frontend-tests.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            exit 1
          fi

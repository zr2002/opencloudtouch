# ==============================================================================
# BUILD DOCKER IMAGES - Multi-arch Docker images (amd64, arm64, arm/v7)
#
# Triggered by:
#   - workflow_dispatch: manually with a version string (e.g. "1.2.0")
#   - workflow_call: from release.yml after version bump + tag
#
# Raspberry Pi SD card images are built separately via build-raspi.yml.
#
# Does NOT run tests. CI must be green before calling this workflow.
#
# Required Secrets:
#   - SUPPORTERS_API_PASS: Password for fetching supporters from opencloudtouch.org
# ==============================================================================

name: Build Docker Images

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: false
        type: choice
        options:
          - build
          - promote-stable
        default: build
      version:
        description: 'Image version tag (e.g. "1.2.0")'
        required: true
        type: string
      checkout_ref:
        description: 'Git ref to checkout (tag/branch). Leave empty for current ref. Only for action=build.'
        required: false
        type: string
        default: ''
      skip_version_check:
        description: 'Skip version verification (for rebuilding old releases). Only for action=build.'
        required: false
        type: boolean
        default: false
      mark_as_stable:
        description: 'Also tag Docker image as "stable". Only for action=build.'
        required: false
        type: boolean
        default: false

  workflow_call:
    inputs:
      version:
        description: 'Image version tag'
        required: true
        type: string
      checkout_ref:
        description: 'Git ref to checkout'
        required: false
        default: ''
        type: string
      skip_version_check:
        description: 'Skip version verification'
        required: false
        default: false
        type: boolean
      mark_as_stable:
        description: 'Also tag Docker image as stable'
        required: false
        default: false
        type: boolean
    secrets:
      BUILD_SIGNING_KEY:
        required: true
      SUPPORTERS_API_PASS:
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: opencloudtouch/opencloudtouch

# Least-privilege: no default permissions. Jobs declare what they need.
permissions: {}

jobs:
  # ============================================================================
  # PROMOTE TO STABLE (Re-tag existing version without rebuilding)
  # ============================================================================
  promote-stable:
    name: Promote ${{ inputs.version }} to stable
    runs-on: ubuntu-latest
    if: inputs.action == 'promote-stable'
    permissions:
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote version to stable
        run: |
          echo "🏷️ Promoting ${{ inputs.version }} → stable"
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}

      - name: Verify stable tag
        run: |
          echo "✅ Stable tag updated:"
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:stable

  # ============================================================================
  # BUILD FRONTEND
  # ============================================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: inputs.action == '' || inputs.action == 'build'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-x64-gnu --save-optional

      - name: Fetch supporters from opencloudtouch.org
        env:
          SUPPORTERS_API_USER: oct-ci
          SUPPORTERS_API_PASS: ${{ secrets.SUPPORTERS_API_PASS }}
        run: |
          # Fetch current supporters CSV via Basic Auth
          AUTH=$(echo -n "$SUPPORTERS_API_USER:$SUPPORTERS_API_PASS" | base64)
          curl -H "Authorization: Basic $AUTH" \
            https://opencloudtouch.org/api/supporters/get.php \
            -o apps/frontend/public/supporters.csv --fail --silent --show-error || {
            echo "⚠️ Failed to fetch supporters, using empty CSV"
            echo "name,type,amount,monthlyAmount,firstSupportDate" > apps/frontend/public/supporters.csv
          }
          echo "✅ Supporters: $(wc -l < apps/frontend/public/supporters.csv) lines"

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: .out/dist
          retention-days: 1

  # ============================================================================
  # DOCKER SECURITY SCAN (gate before multi-arch build)
  # ============================================================================
  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    if: inputs.action == '' || inputs.action == 'build'
    needs: [build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Download pre-built frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: .out/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute build signature
        id: sign
        run: |
          VERSION="${{ inputs.version }}"
          SIG=$(echo -n "$VERSION" | openssl dgst -sha256 -hmac "${{ secrets.BUILD_SIGNING_KEY }}" | awk '{print $NF}' | cut -c1-16)
          echo "signature=$SIG" >> $GITHUB_OUTPUT

      - name: Build test image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployment/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: opencloudtouch:test
          build-args: |
            OCT_BUILD_SIGNATURE=${{ steps.sign.outputs.signature }}
          cache-from: type=gha,scope=trivy-scan
          cache-to: type=gha,mode=max,scope=trivy-scan

      - name: Run Trivy vulnerability scanner (blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'opencloudtouch:test'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Run Trivy with JSON output (artifact)
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        with:
          image-ref: 'opencloudtouch:test'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'HIGH,CRITICAL,MEDIUM,LOW'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-scan-results
          path: trivy-results.json
          retention-days: 30

      - name: Verify app version matches release
        if: ${{ inputs.skip_version_check != true }}
        run: |
          EXPECTED="${{ inputs.version }}"
          echo "Expected version: $EXPECTED"

          # Start container in background
          docker run -d --name oct-version-check \
            -e OCT_DISCOVERY_ENABLED=false \
            -p 7777:7777 \
            opencloudtouch:test

          # Wait for health endpoint
          echo "Waiting for health endpoint..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7777/health > /dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Container did not start within 30s"
              docker logs oct-version-check
              exit 1
            fi
            sleep 1
          done

          # Check version
          ACTUAL=$(curl -sf http://localhost:7777/health | jq -r '.version')
          echo "Actual version from /health: $ACTUAL"

          docker stop oct-version-check > /dev/null

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Version mismatch! /health reports '$ACTUAL' but release version is '$EXPECTED'"
            exit 1
          fi

          echo "✅ Version match: $ACTUAL == $EXPECTED"

  # ============================================================================
  # DOCKER BUILD (parallel multi-arch)
  # ============================================================================
  build-docker:
    name: Build Docker Image (${{ matrix.platform }})
    runs-on: ubuntu-latest
    if: inputs.action == '' || inputs.action == 'build'
    needs: [docker-security]

    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64, linux/arm/v7]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Download pre-built frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: .out/dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest
            type=raw,value=stable,enable=${{ inputs.mark_as_stable == true }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build signature
        id: sign
        run: |
          VERSION="${{ inputs.version }}"
          SIG=$(echo -n "$VERSION" | openssl dgst -sha256 -hmac "${{ secrets.BUILD_SIGNING_KEY }}" | awk '{print $NF}' | cut -c1-16)
          echo "signature=$SIG" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployment/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            OCT_BUILD_SIGNATURE=${{ steps.sign.outputs.signature }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ============================================================================
  # DOCKER PUSH (merge digests - create multi-arch manifest)
  # ============================================================================
  push-docker:
    name: Push Docker Image
    runs-on: ubuntu-latest
    if: inputs.action == '' || inputs.action == 'build'
    needs: [build-docker]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest
            type=raw,value=stable,enable=${{ inputs.mark_as_stable == true }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}

  # ============================================================================
  # CONTAINER SECURITY SCAN (post-push)
  # ============================================================================
  container-scan:
    name: Scan Container (post-push)
    runs-on: ubuntu-latest
    if: inputs.action == '' || inputs.action == 'build'
    needs: [push-docker]

    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy (table output)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'

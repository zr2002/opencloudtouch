# ==============================================================================
# BUILD IMAGES - Docker multi-arch + Raspberry Pi SD card images
#
# Triggered by:
#   - workflow_dispatch: manually with a version string (e.g. "1.2.0")
#   - workflow_call: from release.yml after version bump + tag
#
# Does NOT run tests. CI must be green before calling this workflow.
# ==============================================================================

name: Build Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version tag (e.g. "1.2.0")'
        required: true
        type: string
      architectures:
        description: 'Raspberry Pi architectures to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - arm64
          - armhf
      attach_to_release:
        description: 'Attach Raspi images to GitHub Release'
        required: false
        default: true
        type: boolean
      checkout_ref:
        description: 'Git ref to checkout (tag/branch). Leave empty for current ref.'
        required: false
        type: string
        default: ''
      skip_version_check:
        description: 'Skip version verification (for rebuilding old releases)'
        required: false
        type: boolean
        default: false

  workflow_call:
    inputs:
      version:
        description: 'Image version tag'
        required: true
        type: string
      architectures:
        description: 'Raspberry Pi architectures'
        required: false
        default: 'all'
        type: string
      attach_to_release:
        description: 'Attach Raspi images to release'
        required: false
        default: true
        type: boolean
      checkout_ref:
        description: 'Git ref to checkout'
        required: false
        default: ''
        type: string
      skip_version_check:
        description: 'Skip version verification'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: scheilch/opencloudtouch
  PI_GEN_REPO: https://github.com/RPi-Distro/pi-gen.git

jobs:
  # ============================================================================
  # BUILD FRONTEND
  # ============================================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm install @rollup/rollup-linux-x64-gnu --save-optional

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: .out/dist
          retention-days: 1

  # ============================================================================
  # DOCKER SECURITY SCAN (gate before multi-arch build)
  # ============================================================================
  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    needs: [build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Download pre-built frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: .out/dist

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute build signature
        id: sign
        run: |
          VERSION="${{ inputs.version }}"
          SIG=$(echo -n "$VERSION" | openssl dgst -sha256 -hmac "${{ secrets.BUILD_SIGNING_KEY }}" | awk '{print $NF}' | cut -c1-16)
          echo "signature=$SIG" >> $GITHUB_OUTPUT

      - name: Build test image for scanning
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployment/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: opencloudtouch:test
          build-args: |
            OCT_BUILD_SIGNATURE=${{ steps.sign.outputs.signature }}
          cache-from: type=gha,scope=trivy-scan
          cache-to: type=gha,mode=max,scope=trivy-scan

      - name: Run Trivy vulnerability scanner (blocking)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'opencloudtouch:test'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

      - name: Run Trivy with JSON output (artifact)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: 'opencloudtouch:test'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'HIGH,CRITICAL,MEDIUM,LOW'

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: trivy-scan-results
          path: trivy-results.json
          retention-days: 30

      - name: Verify app version matches release
        if: ${{ inputs.skip_version_check != true }}
        run: |
          EXPECTED="${{ inputs.version }}"
          echo "Expected version: $EXPECTED"

          # Start container in background
          docker run -d --name oct-version-check \
            -e OCT_DISCOVERY_ENABLED=false \
            -p 7777:7777 \
            opencloudtouch:test

          # Wait for health endpoint
          echo "Waiting for health endpoint..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:7777/health > /dev/null 2>&1; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::Container did not start within 30s"
              docker logs oct-version-check
              exit 1
            fi
            sleep 1
          done

          # Check version
          ACTUAL=$(curl -sf http://localhost:7777/health | jq -r '.version')
          echo "Actual version from /health: $ACTUAL"

          docker stop oct-version-check > /dev/null

          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Version mismatch! /health reports '$ACTUAL' but release version is '$EXPECTED'"
            exit 1
          fi

          echo "✅ Version match: $ACTUAL == $EXPECTED"

  # ============================================================================
  # DOCKER BUILD (parallel multi-arch)
  # ============================================================================
  build-docker:
    name: Build Docker Image (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [docker-security]

    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64, linux/arm/v7]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Download pre-built frontend
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: .out/dist

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute build signature
        id: sign
        run: |
          VERSION="${{ inputs.version }}"
          SIG=$(echo -n "$VERSION" | openssl dgst -sha256 -hmac "${{ secrets.BUILD_SIGNING_KEY }}" | awk '{print $NF}' | cut -c1-16)
          echo "signature=$SIG" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deployment/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            OCT_BUILD_SIGNATURE=${{ steps.sign.outputs.signature }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=build-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ strategy.job-index }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # ============================================================================
  # DOCKER PUSH (merge digests - create multi-arch manifest)
  # ============================================================================
  push-docker:
    name: Push Docker Image
    runs-on: ubuntu-latest
    needs: [build-docker]

    permissions:
      contents: read
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}

  # ============================================================================
  # CONTAINER SECURITY SCAN (post-push)
  # ============================================================================
  container-scan:
    name: Scan Container (post-push)
    runs-on: ubuntu-latest
    needs: [push-docker]

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run Trivy (table output)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ inputs.version }}
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'

  # ============================================================================
  # BUILD RASPBERRY PI IMAGES
  # ============================================================================
  build-raspi:
    name: Build Raspi ${{ matrix.arch }} Image
    runs-on: ubuntu-latest
    needs: [push-docker]
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON((inputs.architectures || 'all') == 'all' && '["arm64", "armhf"]' || format('["{0}"]', inputs.architectures)) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost /usr/share/swift || true
          sudo apt-get clean
          df -h /

      - name: Clone pi-gen
        run: |
          # arm64 branch only ships 64-bit kernels (kernel8.img)
          # master branch ships 32-bit kernels (kernel7.img) needed for RPi 2
          if [ "${{ matrix.arch }}" = "armhf" ]; then
            PI_GEN_BRANCH=master
          else
            PI_GEN_BRANCH=arm64
          fi
          git clone --depth 1 --branch "$PI_GEN_BRANCH" \
            ${{ env.PI_GEN_REPO }} pi-gen

      - name: Configure pi-gen
        run: |
          cd pi-gen
          cat > config << 'EOF'
          IMG_NAME=opencloudtouch-${{ matrix.arch }}
          RELEASE=trixie
          TARGET_HOSTNAME=opencloudtouch
          FIRST_USER_NAME=oct
          FIRST_USER_PASS=opencloudtouch
          ENABLE_SSH=1
          LOCALE_DEFAULT=en_GB.UTF-8
          KEYBOARD_KEYMAP=us
          KEYBOARD_LAYOUT="English (US)"
          TIMEZONE_DEFAULT=Europe/Berlin
          WPA_COUNTRY=DE
          STAGE_LIST="stage0 stage1 stage2 stage-opencloudtouch"
          EOF
          sed -i 's/^          //' config
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            echo "ARCH=arm64" >> config
          else
            echo "ARCH=armhf" >> config
          fi
          cat config

      - name: Install OpenCloudTouch stage
        run: |
          cp -r deployment/raspi-image/stage-opencloudtouch pi-gen/stage-opencloudtouch
          find pi-gen/stage-opencloudtouch -name "*.sh" -exec chmod +x {} \;
          mkdir -p pi-gen/stage-opencloudtouch/01-configure-oct/files
          cp deployment/raspi-image/files/* pi-gen/stage-opencloudtouch/01-configure-oct/files/

          OCT_VERSION="${{ inputs.version }}"
          if [ -n "$OCT_VERSION" ] && [ "$OCT_VERSION" != "latest" ]; then
            sed -i "s|ghcr.io/scheilch/opencloudtouch:latest|ghcr.io/scheilch/opencloudtouch:${OCT_VERSION}|g" \
              pi-gen/stage-opencloudtouch/01-configure-oct/files/docker-compose.yml
          fi

          touch pi-gen/stage-opencloudtouch/EXPORT_IMAGE
          touch pi-gen/stage-opencloudtouch/EXPORT_NOOBS
          touch pi-gen/stage0/SKIP_IMAGES
          touch pi-gen/stage1/SKIP_IMAGES
          touch pi-gen/stage2/SKIP_IMAGES
          touch pi-gen/stage3/SKIP 2>/dev/null || true
          touch pi-gen/stage4/SKIP 2>/dev/null || true
          touch pi-gen/stage5/SKIP 2>/dev/null || true

      - name: Patch pi-gen package lists
        run: |
          PKGFILE="pi-gen/stage2/01-sys-tweaks/00-packages"
          sed -i '/rpi-/d' "$PKGFILE"
          sed -i '/^raspberrypi-sys-mods$/d' "$PKGFILE"
          sed -i '/^raspi-utils$/d' "$PKGFILE"
          sed -i '/^kms++-utils$/d' "$PKGFILE"
          sed -i '/^libpam-chksshpwd$/d' "$PKGFILE"

          NETPKGFILE="pi-gen/stage2/02-net-tweaks/00-packages"
          sed -i '/raspberrypi-net-mods/d' "$NETPKGFILE"
          sed -i '/^firmware-marvell/d' "$NETPKGFILE"

          touch pi-gen/stage2/04-cloud-init/SKIP
          touch pi-gen/export-image/01-user-rename/SKIP

          RUN_SCRIPT="pi-gen/stage2/01-sys-tweaks/01-run.sh"
          sed -i 's/systemctl enable rpi-resize/systemctl enable rpi-resize 2>\/dev\/null || true/' "$RUN_SCRIPT"

      - name: Fix Debian GPG keyring
        run: |
          cd pi-gen
          sed -i '/^on_chroot/i \
          if [ -f /usr/share/keyrings/debian-archive-keyring.gpg ]; then\
              cp /usr/share/keyrings/debian-archive-keyring.gpg "${ROOTFS_DIR}/usr/share/keyrings/debian-archive-keyring.pgp"\
          fi\
          ' stage0/00-configure-apt/00-run.sh

      - name: Set up QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support
          sudo update-binfmts --enable
          sudo ln -sf /usr/bin/qemu-aarch64-static /usr/bin/qemu-aarch64
          sudo ln -sf /usr/bin/qemu-arm-static /usr/bin/qemu-arm

      - name: Build image with pi-gen
        run: |
          cd pi-gen
          chmod +x build-docker.sh
          ./build-docker.sh
        timeout-minutes: 60

      - name: Compress and checksum image
        id: image
        run: |
          OCT_VERSION="${{ inputs.version || 'latest' }}"

          IMG_FILE=$(find pi-gen/deploy -name "*.img" -type f | head -1)
          if [ -z "$IMG_FILE" ]; then
            ZIP_FILE=$(find pi-gen/deploy -name "*.zip" -type f | head -1)
            if [ -n "$ZIP_FILE" ]; then
              unzip -o "$ZIP_FILE" -d pi-gen/deploy/
              IMG_FILE=$(find pi-gen/deploy -name "*.img" -type f | head -1)
            fi
          fi

          if [ -z "$IMG_FILE" ]; then
            echo "::error::No image file found!"
            ls -laR pi-gen/deploy/ || true
            exit 1
          fi

          OUTPUT_NAME="opencloudtouch-${{ matrix.arch }}-${OCT_VERSION}.img.xz"
          xz -9 -T0 "$IMG_FILE"
          mkdir -p output
          mv "${IMG_FILE}.xz" "output/${OUTPUT_NAME}"
          cd output
          sha256sum "${OUTPUT_NAME}" > "${OUTPUT_NAME}.sha256"
          echo "output_name=${OUTPUT_NAME}" >> "$GITHUB_OUTPUT"
          ls -lh .

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: raspi-image-${{ matrix.arch }}
          path: |
            output/*.img.xz
            output/*.sha256
          retention-days: 30
          compression-level: 0

  # ============================================================================
  # TEST RASPBERRY PI IMAGES (QEMU chroot smoke test)
  # ============================================================================
  test-raspi:
    name: Test Raspi ${{ matrix.arch }} Image
    runs-on: ubuntu-latest
    needs: [build-raspi]
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON((inputs.architectures || 'all') == 'all' && '["arm64", "armhf"]' || format('["{0}"]', inputs.architectures)) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout_ref || github.ref }}

      - name: Download image artifact
        uses: actions/download-artifact@v8
        with:
          name: raspi-image-${{ matrix.arch }}
          path: images

      - name: Set up QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-user-static binfmt-support xz-utils
          sudo update-binfmts --enable

      - name: Mount image
        id: mount
        run: |
          set -euo pipefail
          OCT_VERSION="${{ inputs.version || 'latest' }}"
          IMG_XZ="images/opencloudtouch-${{ matrix.arch }}-${OCT_VERSION}.img.xz"

          echo "=== Decompressing image ==="
          xz -d "$IMG_XZ"
          IMG_FILE="${IMG_XZ%.xz}"

          echo "=== Mounting image ==="
          LOOP=$(sudo losetup --find --show --partscan "$IMG_FILE")
          echo "Loop device: $LOOP"
          lsblk "$LOOP"

          sudo mkdir -p /mnt/raspi
          sudo mount "${LOOP}p2" /mnt/raspi
          sudo mount "${LOOP}p1" /mnt/raspi/boot/firmware || \
            sudo mount "${LOOP}p1" /mnt/raspi/boot || true

          echo "loop=$LOOP" >> "$GITHUB_OUTPUT"

      - name: Run smoke tests
        run: |
          chmod +x deployment/raspi-image/test-image.sh
          sudo deployment/raspi-image/test-image.sh \
            /mnt/raspi \
            "${{ inputs.version || 'latest' }}" \
            "${{ matrix.arch }}"

      - name: Cleanup
        if: always()
        run: |
          sudo umount -R /mnt/raspi 2>/dev/null || true
          sudo losetup -d "${{ steps.mount.outputs.loop }}" 2>/dev/null || true

  # ============================================================================
  # ATTACH RASPI IMAGES TO RELEASE
  # ============================================================================
  attach-to-release:
    name: Attach Raspi Images to Release
    runs-on: ubuntu-latest
    needs: [build-raspi, test-raspi]
    if: ${{ inputs.attach_to_release != false }}

    permissions:
      contents: write

    steps:
      - name: Download all image artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: raspi-image-*
          path: images
          merge-multiple: true

      - name: Get release tag
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="v${{ inputs.version }}"
          # Check if release exists
          if ! gh api repos/${{ github.repository }}/releases/tags/${RELEASE_TAG} > /dev/null 2>&1; then
            RELEASE_TAG=$(gh api repos/${{ github.repository }}/releases/latest \
              --jq '.tag_name' 2>/dev/null || echo "")
          fi
          if [ -z "$RELEASE_TAG" ]; then
            echo "::error::No release found to attach images to."
            exit 1
          fi
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Attaching to release: ${RELEASE_TAG}"

      - name: Upload images to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd images
          for file in *.img.xz *.sha256; do
            echo "Uploading: $file"
            gh release upload "${{ steps.release.outputs.release_tag }}" \
              "$file" \
              --repo "${{ github.repository }}" \
              --clobber
          done
          gh release view "${{ steps.release.outputs.release_tag }}" \
            --repo "${{ github.repository }}"

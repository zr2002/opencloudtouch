components:
  schemas:
    AccountPairingRequest:
      properties:
        device_ip:
          type: string
          title: Device Ip
          description: Device IP address
        device_id:
          type: string
          title: Device Id
          description: Device ID (MAC address)
      type: object
      required:
      - device_ip
      - device_id
      title: AccountPairingRequest
      description: Request to ensure device has a margeAccountUUID.
    AccountPairingResponse:
      properties:
        success:
          type: boolean
          title: Success
        had_uuid:
          type: boolean
          title: Had Uuid
          description: True if UUID was already present
          default: false
        uuid:
          type: string
          title: Uuid
          description: The current or newly set UUID
          default: ''
        message:
          type: string
          title: Message
          default: ''
      type: object
      required:
      - success
      title: AccountPairingResponse
      description: Response from account pairing.
    AuditBatchRequest:
      properties:
        entries:
          items:
            $ref: '#/components/schemas/AuditEntryRequest'
          type: array
          maxItems: 200
          minItems: 1
          title: Entries
      type: object
      required:
      - entries
      title: AuditBatchRequest
      description: Batch of audit entries (reduces HTTP roundtrips).
    AuditBatchResponse:
      properties:
        success:
          type: boolean
          title: Success
        count:
          type: integer
          title: Count
      type: object
      required:
      - success
      - count
      title: AuditBatchResponse
      description: Response for batch creation.
    AuditEntryRequest:
      properties:
        device_id:
          type: string
          title: Device Id
          description: Device MAC/ID
        category:
          type: string
          title: Category
          description: 'Event category: user_action, device_info, api_call, config_change,
            step_transition, checkbox, dropdown, error'
        event:
          type: string
          title: Event
          description: Short event name, e.g. 'button_click:next'
        step:
          anyOf:
          - type: integer
            maximum: 7.0
            minimum: 0.0
          - type: 'null'
          title: Step
          description: Wizard step number (0=init)
        detail:
          anyOf:
          - type: string
            maxLength: 10000
          - type: 'null'
          title: Detail
          description: JSON-encoded extra data (free-form)
        timestamp:
          anyOf:
          - type: string
          - type: 'null'
          title: Timestamp
          description: ISO-8601 timestamp from frontend
      type: object
      required:
      - device_id
      - category
      - event
      title: AuditEntryRequest
      description: Single wizard audit log entry from the frontend.
    AuditEntryResponse:
      properties:
        success:
          type: boolean
          title: Success
        id:
          type: integer
          title: Id
      type: object
      required:
      - success
      - id
      title: AuditEntryResponse
      description: Response for single entry creation.
    BackupFileInfoResponse:
      properties:
        filename:
          type: string
          title: Filename
        volume_type:
          type: string
          title: Volume Type
        file_path:
          type: string
          title: File Path
        size_bytes:
          type: integer
          title: Size Bytes
          default: 0
        device_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Device Id
        backup_date:
          anyOf:
          - type: string
          - type: 'null'
          title: Backup Date
        is_pre_restore:
          type: boolean
          title: Is Pre Restore
          default: false
        validation_status:
          type: string
          title: Validation Status
          default: valid
        validation_message:
          type: string
          title: Validation Message
          default: ''
      type: object
      required:
      - filename
      - volume_type
      - file_path
      title: BackupFileInfoResponse
      description: Single backup file info in scan response.
    BackupRequest:
      properties:
        device_ip:
          type: string
          title: Device Ip
        device_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Device Id
          description: Device identifier for unique backup filenames
      type: object
      required:
      - device_ip
      title: BackupRequest
      description: Request to create device backup.
    BackupResponse:
      properties:
        success:
          type: boolean
          title: Success
        message:
          type: string
          title: Message
        volumes:
          items:
            type: object
          type: array
          title: Volumes
        total_size_mb:
          type: number
          title: Total Size Mb
          default: 0.0
        total_duration_seconds:
          type: number
          title: Total Duration Seconds
          default: 0.0
      type: object
      required:
      - success
      - message
      title: BackupResponse
      description: Response with backup results.
    BackupSetResponse:
      properties:
        device_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Device Id
        backup_date:
          anyOf:
          - type: string
          - type: 'null'
          title: Backup Date
        files:
          items:
            $ref: '#/components/schemas/BackupFileInfoResponse'
          type: array
          title: Files
        is_legacy:
          type: boolean
          title: Is Legacy
          default: false
        is_match:
          type: boolean
          title: Is Match
          default: false
      type: object
      title: BackupSetResponse
      description: Backup set in scan response.
    Body_set_mute_api_devices__device_id__mute_put:
      properties:
        muted:
          type: boolean
          title: Muted
      type: object
      required:
      - muted
      title: Body_set_mute_api_devices__device_id__mute_put
    Body_set_volume_api_devices__device_id__volume_put:

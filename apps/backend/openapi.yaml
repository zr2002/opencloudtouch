  /device/{device_id}/preset/{preset_id}:
    get:
      tags:
      - device-presets
      summary: Stream Device Preset
      description: "Stream proxy endpoint for Bose SoundTouch custom presets.\n\n\
        **How it works:**\n1. User configures preset via OCT UI (e.g., \"Absolut Relax\"\
        \ → Preset 1)\n2. OCT stores mapping in database: `device_id=689E194F7D2F,\
        \ preset=1, url=https://stream.url`\n3. OCT programs Bose device with OCT\
        \ backend URL:\n   ```\n   location=\"http://192.168.1.108:7777/device/689E194F7D2F/preset/1\"\
        \n   ```\n4. User presses PRESET_1 button on Bose device\n5. Bose requests:\
        \ `GET /device/689E194F7D2F/preset/1`\n6. OCT looks up preset in database\n\
        7. **OCT proxies HTTPS stream as HTTP:** Fetches from RadioBrowser, streams\
        \ to Bose\n8. Bose receives HTTP audio stream and plays ✅\n\n**Why HTTP proxy\
        \ instead of direct HTTPS URL?**\n- ❌ Bose cannot play HTTPS streams directly\
        \ (certificate validation fails)\n- ❌ HTTP 302 redirect to HTTPS URL → INVALID_SOURCE\
        \ error\n- ✅ OCT acts as HTTP audio proxy: Fetches HTTPS → Serves as HTTP\
        \ chunked transfer\n- ✅ Bose treats OCT like \"TuneIn integration\" (trusted\
        \ HTTP source)\n\n**Example flow:**\n```\nRequest:  GET /device/689E194F7D2F/preset/1\n\
        Response: HTTP 200 OK\n          Content-Type: audio/mpeg\n          Transfer-Encoding:\
        \ chunked\n          icy-name: Absolut Relax\n          [Audio data stream:\
        \ chunk1, chunk2, chunk3...]\n```\n\nArgs:\n    device_id: Bose device identifier\
        \ (from URL path)\n    preset_id: Preset number 1-6 (from URL path)\n    preset_service:\
        \ Injected preset service\n\nReturns:\n    StreamingResponse with proxied\
        \ audio stream\n\nRaises:\n    404: Preset not configured for this device\n\
        \    502: RadioBrowser stream unavailable\n    500: Internal server error"
      operationId: stream_device_preset_device__device_id__preset__preset_id__get
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          description: Device identifier
          title: Device Id
        description: Device identifier
      - name: preset_id
        in: path
        required: true
        schema:
          type: integer
          maximum: 6
          minimum: 1
          description: Preset number (1-6)
          title: Preset Id
        description: Preset number (1-6)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /descriptor/device/{device_id}/preset/{preset_id}:
    get:
      tags:
      - device-descriptors
      summary: Get Preset Descriptor
      description: "Get preset descriptor XML for Bose SoundTouch device.\n\n**How\
        \ it works:**\nBose devices with `source=\"INTERNET_RADIO\"` expect an XML\
        \ descriptor endpoint\n(similar to TuneIn's `/v1/playback/station/...` endpoints).\n\
        \n**Flow:**\n1. OCT programs Bose preset with descriptor URL:\n   ```xml\n\
        \   <ContentItem source=\"INTERNET_RADIO\"\n                location=\"http://192.168.1.100:7777/descriptor/device/689E194F7D2F/preset/1\"\
        >\n     <itemName>Absolut relax</itemName>\n   </ContentItem>\n   ```\n2.\
        \ User presses PRESET_1 button on Bose device\n3. Bose requests: `GET /descriptor/device/689E194F7D2F/preset/1`\n\
        4. OCT returns XML with **direct stream URL**:\n   ```xml\n   <ContentItem\
        \ source=\"INTERNET_RADIO\" type=\"stationurl\"\n                location=\"\
        https://absolut-relax.live-sm.absolutradio.de/absolut-relax\">\n     <itemName>Absolut\
        \ relax</itemName>\n   </ContentItem>\n   ```\n5. Bose fetches stream from\
        \ direct URL and plays ✅\n\nArgs:\n    device_id: Bose device identifier\n\
        \    preset_id: Preset number 1-6\n    preset_service: Injected preset service\n\
        \nReturns:\n    XML Response with ContentItem descriptor\n\nRaises:\n    404:\
        \ Preset not configured"
      operationId: get_preset_descriptor_descriptor_device__device_id__preset__preset_id__get
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          description: Device identifier
          title: Device Id
        description: Device identifier
      - name: preset_id
        in: path
        required: true
        schema:
          type: integer
          maximum: 6
          minimum: 1
          description: Preset number (1-6)
          title: Preset Id
        description: Preset number (1-6)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'

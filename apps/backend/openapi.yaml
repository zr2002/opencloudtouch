        additional_info:
          type: string
          title: Additional Info
          default: ''
        other_installation:
          type: string
          title: Other Installation
          default: ''
        other_hardware:
          type: string
          title: Other Hardware
          default: ''
        other_device:
          type: string
          title: Other Device
          default: ''
        screenshot_data_url:
          type: string
          title: Screenshot Data Url
          default: ''
        frontend_logs:
          items:
            type: object
          type: array
          title: Frontend Logs
          default: []
        browser_info:
          type: string
          title: Browser Info
          default: ''
        current_route:
          type: string
          title: Current Route
          default: ''
        click_timestamp:
          type: number
          title: Click Timestamp
          default: 0.0
      type: object
      required:
      - description
      - steps_to_reproduce
      - expected_behavior
      - installation_type
      - hardware
      title: BugReportRequest
    BugReportResponse:
      properties:

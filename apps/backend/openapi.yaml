openapi: 3.1.0
info:
  title: OpenCloudTouch
  description: Open-Source replacement for discontinued streaming device cloud features
  version: 1.5.1
paths:
  /api/events/device-stream:
    get:
      tags:
      - Events
      summary: Device Event Stream
      description: "Stream device events via Server-Sent Events (SSE).\n\nPushes\
        \ an initial snapshot of all known device states, then streams real-time updates.\
        \ A keepalive comment is sent every 15 seconds.\n\nEvent Types:\n    - snapshot:\
        \ Initial state of all devices\n    - nowPlaying: Now-playing update for a\
        \ device\n    - volume: Volume change for a device\n    - zones: Zone membership\
        \ change\n    - connectionState: WebSocket connection state change"
      operationId: device_event_stream_api_events_device_stream_get
      responses:
        '200':
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
  /api/devices/discover:
    get:
      tags:
      - Devices
      summary: Discover Devices
      description: "Trigger device discovery.\n\nReturns:\n    List of discovered\
        \ devices (not yet saved to DB)"
      operationId: discover_devices_api_devices_discover_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Discover Devices Api Devices Discover Get
  /api/devices/sync:
    post:
      tags:
      - Devices
      summary: Sync Devices
      description: "Discover devices and sync to database.\nQueries each device for\
        \ detailed info (/info endpoint).\n\nReturns:\n    Sync summary with success/failure\
        \ counts"
      operationId: sync_devices_api_devices_sync_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/devices/discover/stream:
    get:
      tags:
      - Devices
      summary: Discover Devices Stream
      description: "Discover devices and stream results via Server-Sent Events (SSE).\n\
        \nProgressive loading:\n- Sends `device_found` events as devices are discovered\
        \ via SSDP\n- Sends `device_synced` events as devices are saved to DB\n- Sends\
        \ `completed` event when done\n\nFrontend can show devices immediately instead\
        \ of waiting for full scan.\n\nReturns:\n    StreamingResponse with SSE events\n\
        \nEvent Types:\n    - started: Discovery started\n    - device_found: Device\
        \ discovered (SSDP response)\n    - device_synced: Device synced to DB\n \
        \   - device_failed: Device sync failed\n    - completed: Discovery finished\n\
        \    - error: Error occurred\n\nExample SSE Stream:\n    event: started\n\
        \    data: {\"message\": \"Starting discovery\"}\n\n    event: device_found\n\
        \    data: {\"ip\": \"192.168.1.100\", \"name\": \"Küche\", \"model\": \"\
        SoundTouch 10\"}\n\n    event: device_synced\n    data: {\"id\": 1, \"device_id\"\
        : \"ABC123\", \"ip\": \"192.168.1.100\", ...}\n\n    event: completed\n  \
        \  data: {\"discovered\": 3, \"synced\": 3, \"failed\": 0}"
      operationId: discover_devices_stream_api_devices_discover_stream_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/devices/probe:
    post:
      tags:
      - Devices
      summary: Probe Device
      description: "Probe a single device by IP address.\n\nContacts the device at\
        \ the given IP, fetches its info, upserts it\nto the database, and adds the\
        \ IP to the manual IPs list.\n\nReturns:\n    Device data if reachable\n\n\
        Raises:\n    422: Invalid IP format\n    404: Device not reachable at the\
        \ given IP"
      operationId: probe_device_api_devices_probe_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProbeRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '404':
          description: Device not reachable
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices:
    get:
      tags:
      - Devices
      summary: Get Devices
      description: "Get all devices from database.\n\nReturns:\n    List of devices\
        \ with details"
      operationId: get_devices_api_devices_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    delete:
      tags:
      - Devices
      summary: Delete All Devices
      description: "Delete all devices from database.\n\n**Testing/Development endpoint\
        \ only.**\nUse for cleaning database before E2E tests or manual testing.\n\
        \n**Protected**: Requires OCT_ALLOW_DANGEROUS_OPERATIONS=true\n\nReturns:\n\
        \    Confirmation message\n\nRaises:\n    HTTPException(403): If dangerous\
        \ operations are disabled in production"
      operationId: delete_all_devices_api_devices_delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/devices/{device_id}:
    delete:
      tags:
      - Devices
      summary: Delete By Device Id
      description: "Delete device by id from database.\n\nArgs:\n    device_id: Device\
        \ ID\n\nReturns:\n    Confirmation message"
      operationId: delete_by_device_id_api_devices__device_id__delete
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - Devices
      summary: Get Device
      description: "Get single device by device_id.\n\nArgs:\n    device_id: Device\
        \ ID\n\nReturns:\n    Device details\n\nRaises:\n    DeviceNotFoundError:\
        \ If device does not exist"
      operationId: get_device_api_devices__device_id__get
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/{device_id}/capabilities:
    get:
      tags:
      - Devices
      summary: Get Device Capabilities Endpoint
      description: "Get device capabilities for UI feature detection.\n\nReturns which\
        \ features this specific device supports:\n- HDMI control (ST300 only)\n-\
        \ Bass/balance controls\n- Available input sources\n- Zone/group support\n\
        - All supported endpoints\n\nArgs:\n    device_id: Device ID\n\nReturns:\n\
        \    Feature flags and capabilities for UI rendering\n\nExample Response:\n\
        \    {\n        \"device_id\": \"AABBCC112233\",\n        \"device_type\"\
        : \"SoundTouch 30 Series III\",\n        \"is_soundbar\": false,\n       \
        \ \"features\": {\n            \"hdmi_control\": false,\n            \"bass_control\"\
        : true,\n            \"bluetooth\": true,\n            ...\n        },\n \
        \       \"sources\": [\"BLUETOOTH\", \"AUX\", \"INTERNET_RADIO\"],\n     \
        \   \"advanced\": {...}\n    }"
      operationId: get_device_capabilities_endpoint_api_devices__device_id__capabilities_get
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/{device_id}/key:
    post:
      tags:
      - Devices
      summary: Press Key
      description: "Simulate a key press on a device.\n\nUsed for E2E testing to trigger\
        \ preset playback without physical button press.\n\nArgs:\n    device_id:\
        \ Device ID\n    key: Key name (e.g., \"PRESET_1\", \"PRESET_2\", \"PRESET_3\"\
        , ...)\n    state: Key state (\"press\", \"release\", or \"both\"). Default:\
        \ \"both\"\n\nReturns:\n    Success message\n\nRaises:\n    DeviceNotFoundError:\
        \ If device does not exist\n    HTTPException(400): If key or state is invalid\n\
        \    HTTPException(500): If key press fails\n\nExample:\n    POST /api/devices/AABBCC112233/key?key=PRESET_1&state=both"
      operationId: press_key_api_devices__device_id__key_post
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      - name: key
        in: query
        required: true
        schema:
          type: string
          title: Key
      - name: state
        in: query
        required: false
        schema:
          type: string
          default: both
          title: State
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/{device_id}/name:
    put:
      tags:
      - Devices
      summary: Rename Device
      description: "Rename a SoundTouch device.\n\nUpdates the device name on the\
        \ speaker via SSH (SystemConfigurationDB.xml)\nand in the local database.\n\
        \nArgs:\n    device_id: Device ID (MAC address)\n    body: {\"name\": \"New\
        \ Name\"} — 1-30 characters\n\nReturns:\n    Updated device info with previous\
        \ name\n\nRaises:\n    DeviceNotFoundError: If device does not exist\n   \
        \ HTTPException(422): If name validation fails\n    HTTPException(502): If\
        \ SSH connection fails"
      operationId: rename_device_api_devices__device_id__name_put
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              title: Body
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/{device_id}/now-playing:
    get:
      tags:
      - Devices
      summary: Get Now Playing
      description: Get current playback status for a device.
      operationId: get_now_playing_api_devices__device_id__now_playing_get
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                title: Response Get Now Playing Api Devices  Device Id  Now Playing
                  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/{device_id}/volume:
    get:
      tags:
      - Devices
      summary: Get Volume
      description: Get current volume state for a device.
      operationId: get_volume_api_devices__device_id__volume_get
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - Devices
      summary: Set Volume
      description: Set volume level (0-100).
      operationId: set_volume_api_devices__device_id__volume_put
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Body_set_volume_api_devices__device_id__volume_put'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/devices/{device_id}/mute:
    put:
      tags:
      - Devices
      summary: Set Mute
      description: Set mute state.
      operationId: set_mute_api_devices__device_id__mute_put
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          title: Device Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Body_set_mute_api_devices__device_id__mute_put'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/presets/set:
    post:
      tags:
      - presets
      summary: Set Preset
      description: 'Set a preset for a device.


        Creates or updates a preset mapping. When the physical preset button

        is pressed on the SoundTouch device, it will load the configured station.'
      operationId: set_preset_api_presets_set_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresetSetRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresetResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/presets/{device_id}:
    get:
      tags:
      - presets
      summary: Get Device Presets
      description: 'Get all presets for a device.


        Returns all configured presets (1-6) for the specified device.

        Empty slots are not included in the response.'
      operationId: get_device_presets_api_presets__device_id__get
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          description: Device identifier
          title: Device Id
        description: Device identifier
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PresetResponse'
                title: Response Get Device Presets Api Presets  Device Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - presets
      summary: Clear All Presets
      description: 'Clear all presets for a device.


        Removes all preset configurations for the specified device.'
      operationId: clear_all_presets_api_presets__device_id__delete
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          description: Device identifier
          title: Device Id
        description: Device identifier
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/opencloudtouch__presets__api__routes__MessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/presets/{device_id}/{preset_number}:
    get:
      tags:
      - presets
      summary: Get Preset
      description: 'Get a specific preset.


        Returns the preset configuration for the specified device and preset number.'
      operationId: get_preset_api_presets__device_id___preset_number__get
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          description: Device identifier
          title: Device Id
        description: Device identifier
      - name: preset_number
        in: path
        required: true
        schema:
          type: integer
          maximum: 6
          minimum: 1
          description: Preset number (1-6)
          title: Preset Number
        description: Preset number (1-6)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresetResponse'
        '404':
          description: Preset not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - presets
      summary: Clear Preset
      description: 'Clear a specific preset.


        Removes the preset configuration. The physical preset button will no

        longer trigger playback until a new station is assigned.'
      operationId: clear_preset_api_presets__device_id___preset_number__delete
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          description: Device identifier
          title: Device Id
        description: Device identifier
      - name: preset_number
        in: path
        required: true
        schema:
          type: integer
          maximum: 6
          minimum: 1
          description: Preset number (1-6)
          title: Preset Number
        description: Preset number (1-6)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/opencloudtouch__presets__api__routes__MessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/presets/{device_id}/sync:
    post:
      tags:
      - presets
      summary: Sync Presets From Device
      description: "Sync presets from device to OCT database.\n\nFetches presets from\
        \ the physical device and imports them into OCT.\nUseful when a device was\
        \ configured by another OCT instance or manually.\n\nReturns:\n    Message\
        \ with sync count\n\nRaises:\n    404: Device not found\n    502: Device unreachable\n\
        \    500: Internal error"
      operationId: sync_presets_from_device_api_presets__device_id__sync_post
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          description: Device identifier
          title: Device Id
        description: Device identifier
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/opencloudtouch__presets__api__routes__MessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/radio/search:
    get:
      tags:
      - radio
      summary: Search Stations
      description: 'Search radio stations.


        - **q**: Search query (required, min 1 character)

        - **search_type**: Type of search - name, country, or tag (default: name)

        - **limit**: Maximum results (1-50, default: 10)

        - **offset**: Offset for pagination (default: 0)

        - **provider**: Radio provider - radiobrowser or tunein (default: radiobrowser)'
      operationId: search_stations_api_radio_search_get
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          description: Search query
          title: Q
        description: Search query
      - name: search_type
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/SearchType'
          description: 'Search type: name, country, or tag'
          default: name
        description: 'Search type: name, country, or tag'
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 50
          minimum: 1
          description: Maximum number of results
          default: 10
          title: Limit
        description: Maximum number of results
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Offset for pagination
          default: 0
          title: Offset
        description: Offset for pagination
      - name: provider
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ProviderType'
          description: 'Radio provider: radiobrowser or tunein'
          default: radiobrowser
        description: 'Radio provider: radiobrowser or tunein'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RadioSearchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/radio/station/{uuid}:
    get:
      tags:
      - radio
      summary: Get Station Detail
      description: 'Get radio station detail by UUID.


        - **uuid**: Station UUID

        - **provider**: Radio provider - radiobrowser or tunein (default: radiobrowser)'
      operationId: get_station_detail_api_radio_station__uuid__get
      parameters:
      - name: uuid
        in: path
        required: true
        schema:
          type: string
          title: Uuid
      - name: provider
        in: query
        required: false
        schema:
          $ref: '#/components/schemas/ProviderType'
          description: 'Radio provider: radiobrowser or tunein'
          default: radiobrowser
        description: 'Radio provider: radiobrowser or tunein'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RadioStationResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/settings/manual-ips:
    get:
      tags:
      - settings
      summary: Get Manual Ips
      description: "Get all manual device IP addresses.\n\nReturns:\n    List of manually\
        \ configured IP addresses"
      operationId: get_manual_ips_api_settings_manual_ips_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualIPsResponse'
    post:
      tags:
      - settings
      summary: Set Manual Ips
      description: "Replace all manual device IP addresses with new list.\n\nArgs:\n\
        \    request: Request containing list of IP addresses\n\nReturns:\n    Updated\
        \ list of manual IP addresses"
      operationId: set_manual_ips_api_settings_manual_ips_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetManualIPsRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ManualIPsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/settings/manual-ips/{ip}:
    delete:
      tags:
      - settings
      summary: Delete Manual Ip
      description: "Remove a manual device IP address.\n\nArgs:\n    ip: IP address\
        \ to remove\n\nReturns:\n    Success message with removed IP"
      operationId: delete_manual_ip_api_settings_manual_ips__ip__delete
      parameters:
      - name: ip
        in: path
        required: true
        schema:
          type: string
          title: Ip
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/opencloudtouch__settings__routes__MessageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /stations/preset/{device_id}/{preset_number}.json:
    get:
      tags:
      - stations
      summary: Get Station Descriptor
      description: "Get station descriptor for a device preset.\n\nThis endpoint is\
        \ called by SoundTouch devices when a preset button is pressed.\nIt returns\
        \ the stream URL and metadata for playback.\n\nResponse format:\n```json\n\
        {\n    \"stationName\": \"Station Name\",\n    \"streamUrl\": \"http://stream.url/path\"\
        ,\n    \"homepage\": \"https://station.homepage\",\n    \"favicon\": \"https://station.favicon/icon.png\"\
        ,\n    \"uuid\": \"radiobrowser-uuid\"\n}\n```"
      operationId: get_station_descriptor_stations_preset__device_id___preset_number__json_get
      parameters:
      - name: device_id
        in: path
        required: true
        schema:
          type: string
          description: Device identifier
          title: Device Id
        description: Device identifier
      - name: preset_number
        in: path
        required: true
        schema:
          type: integer
          maximum: 6
          minimum: 1
          description: Preset number (1-6)
          title: Preset Number
        description: Preset number (1-6)
      responses:
        '200':
          description: Successful Response
          content:

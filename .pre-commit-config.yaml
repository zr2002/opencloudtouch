# Pre-commit hooks configuration
# See https://pre-commit.com for more information

# Abort immediately on first hook failure.
fail_fast: true

# NOTE: Formatters (black, prettier, ruff --fix, trailing-whitespace,
# end-of-file-fixer, mixed-line-ending) have been moved to a CI autoformat
# job that commits fixes back to the branch.  See .github/workflows/ci.yml.

repos:
  # ============================================================================
  # GIT USER VALIDATION (PREVENT CORPORATE IDS)
  # ============================================================================
  - repo: local
    hooks:
      - id: check-git-user
        name: Validate Git user configuration
        entry: python scripts/hooks/check-git-user.py
        language: system
        always_run: true
        pass_filenames: false

  # ============================================================================
  # LINT-ONLY (no auto-fix — formatting is handled by CI autoformat job)
  # ============================================================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        name: Lint Python code (ruff, no auto-fix)
        files: ^apps/backend/
        args: []

  # ============================================================================
  # VALIDATORS (read-only checks — no file modifications)
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
        args: ['--unsafe']  # Allow custom YAML tags
      - id: check-json
        exclude: 'tsconfig.*\.json$'  # Exclude TypeScript config (allows comments)
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.3
    hooks:
      - id: bandit
        name: Security check Python (bandit)
        files: ^apps/backend/src/
        args: [-ll, -r]
        exclude: ^apps/backend/tests/

  # ============================================================================
  # COMMIT MESSAGE VALIDATION
  # ============================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.6
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # ============================================================================
  # TESTS & LINTERS
  # ============================================================================
  - repo: local
    hooks:
      # Backend Unit Tests (pre-commit)
      - id: pytest-unit
        name: Run backend unit tests (pre-commit)
        entry: .venv/Scripts/python.exe
        args: [-m, pytest, apps/backend/tests/unit, -x, --tb=short, -q, -p, no:xdist, --timeout=30]
        language: system
        pass_filenames: false
        files: ^(apps/backend/|pyproject.toml|requirements.*\.txt)
        stages: [pre-commit]

      # Frontend Unit Tests (pre-commit)
      - id: vitest
        name: Run frontend unit tests (pre-commit)
        entry: npm
        args: [run, test, --prefix, apps/frontend]
        language: system
        pass_filenames: false
        files: ^(apps/frontend/|package.json|apps/backend/openapi.yaml)
        stages: [pre-commit]

      # Frontend ESLint (pre-commit)
      - id: eslint
        name: Lint frontend (eslint, pre-commit)
        entry: npm
        args: [run, lint, --prefix, apps/frontend]
        language: system
        pass_filenames: false
        files: ^apps/frontend/
        stages: [pre-commit]

      # Block deprecated .js test files (TypeScript migration complete)
      - id: no-js-tests
        name: Block new .js test files (use .ts/.tsx)
        entry: node scripts/hooks/check-no-js-tests.mjs
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      # ========================================================================
      # PRE-PUSH: MOJIBAKE CHECK
      # ========================================================================
      - id: check-mojibake
        name: "Check for CP1252-as-UTF8 encoding corruption"
        entry: python
        args: [scripts/check-mojibake.py, .]
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

      # ========================================================================
      # PRE-PUSH: UNIT TESTS (Backend + Frontend) + TYPE CHECK
      # ========================================================================
      - id: unit-tests-must-pass
        name: "MANDATORY: Run unit tests (Backend + Frontend) - 100% must pass"
        entry: npm
        args: [run, test:unit]
        language: system
        pass_filenames: false
        files: ^(apps/backend/|apps/frontend/|package.json|pyproject.toml|requirements.*\.txt|apps/backend/openapi.yaml)
        stages: [pre-push]

      - id: mypy-check
        name: "Type check Python (mypy)"
        entry: .venv/Scripts/python.exe
        args: [-m, mypy, apps/backend/src/opencloudtouch/, --no-error-summary]
        language: system
        pass_filenames: false
        files: ^(apps/backend/|pyproject.toml)
        stages: [pre-push]

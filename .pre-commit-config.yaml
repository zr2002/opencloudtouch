# Pre-commit hooks configuration
# See https://pre-commit.com for more information

repos:
  # ============================================================================
  # COMMIT MESSAGE VALIDATION
  # ============================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.6
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # ============================================================================
  # GENERAL FILE CHECKS
  # ============================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'
      - id: end-of-file-fixer
        exclude: '\.min\.(js|css)$'
      - id: check-yaml
        args: ['--unsafe']  # Allow custom YAML tags
      - id: check-json
        exclude: 'tsconfig.*\.json$'  # Exclude TypeScript config (allows comments)
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: detect-private-key

  # ============================================================================
  # PYTHON BACKEND CHECKS
  # ============================================================================
  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black
        name: Format Python code (black)
        files: ^apps/backend/
        language_version: python3.13

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        name: Lint Python code (ruff)
        files: ^apps/backend/
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.3
    hooks:
      - id: bandit
        name: Security check Python (bandit)
        files: ^apps/backend/src/
        args: [-ll, -r]
        exclude: ^apps/backend/tests/

  # ============================================================================
  # JAVASCRIPT/TYPESCRIPT FRONTEND CHECKS
  # ============================================================================
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format frontend code (prettier)
        files: ^apps/frontend/src/.*\.(js|jsx|ts|tsx|json|css)$
        additional_dependencies:
          - prettier@3.4.2

  # ============================================================================
  # LOCAL HOOKS (Custom scripts) - DISABLED ON WINDOWS
  # Use CI/CD instead or run from Git Bash
  # ============================================================================

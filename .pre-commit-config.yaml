  #       name: Lint frontend (eslint)
  #       entry: cmd /c "cd apps/frontend && npm run lint:src"
  #       language: system
  #       files: ^apps/frontend/src/.*\.(js|jsx|ts|tsx)$
  #       pass_filenames: false

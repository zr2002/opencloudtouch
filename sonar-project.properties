sonar.projectKey=opencloudtouch_opencloudtouch
sonar.organization=opencloudtouch
sonar.projectName=opencloudtouch
sonar.projectVersion=1.4.3

# Source + test directories
sonar.sources=apps/backend/src,apps/frontend/src
sonar.tests=apps/backend/tests,apps/frontend/tests

# Exclusions (generated files, config, assets)
sonar.exclusions=\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/*.egg-info/**,\
  **/dist/**,\
  **/build/**,\
  **/*.min.js,\
  **/*.css,\
  apps/frontend/src/vite-env.d.ts,\
  apps/frontend/src/api/generated/**,\
  apps/frontend/src/**/*.test.ts,\
  apps/frontend/src/**/*.test.tsx

sonar.cpd.exclusions=\
  apps/frontend/src/api/generated/**,\
  apps/frontend/src/pages/thankYouPhrases.ts

sonar.test.exclusions=\
  **/node_modules/**,\
  **/__pycache__/**

# Coverage report paths (written by CI jobs, downloaded by sonar job)
sonar.python.coverage.reportPaths=.out/coverage/backend/coverage.xml
sonar.javascript.lcov.reportPaths=.out/coverage/frontend/lcov.info

# Language settings
sonar.python.version=3.11

# =============================================================================
# FALSE-POSITIVE SUPPRESSIONS
# =============================================================================
# S5332: HTTP protocol usage — Bose SoundTouch devices do not support HTTPS.
# All HTTP communication is intentional and limited to local intranet.
sonar.issue.ignore.multicriteria=e1,e2
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e1.resourceKey=apps/backend/src/opencloudtouch/devices/**
sonar.issue.ignore.multicriteria.e2.ruleKey=python:S5332
sonar.issue.ignore.multicriteria.e2.resourceKey=apps/backend/src/opencloudtouch/setup/**
